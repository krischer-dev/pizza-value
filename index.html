<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pizza Value App</title>

<!-- PWA meta tags -->
<meta name="description" content="Compare pizza sizes and prices to find the best value per cm²">
<meta name="theme-color" content="#C8281A" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0E0B06" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pizza Value">
<link id="manifest-link" rel="manifest">

<!-- Apple touch icon (inline SVG → data URI set by JS) -->
<link id="apple-touch-icon" rel="apple-touch-icon">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── Light tokens ─────────────────────────────────── */
:root {
  --tomato:        #C8281A;
  --tomato-light:  #e83a2a;
  --crust:         #E8C98A;
  --crust-dark:    #A8873A;
  --basil:         #1e6641;
  --basil-mid:     #52b788;

  --bg:            #FAF4EA;
  --card:          #FFFCF6;
  --input-bg:      #F3EAD8;
  --text:          #1A1108;
  --text-sub:      #6B5340;
  --border:        rgba(168,135,58,0.28);
  --metric-bg:     #F3EAD8;
  --placeholder:   rgba(107,83,64,0.40);
  --toggle-track:  rgba(168,135,58,0.35);
  --shadow-sm:     0 2px 12px rgba(26,17,8,0.09);
  --shadow-md:     0 6px 28px rgba(26,17,8,0.13);

  --bar-bg:        #130f07;
  --bar-text:      #EFE4CF;
  --bar-sub:       rgba(239,228,207,0.45);
  --bar-div:       rgba(168,135,58,0.18);
}

/* ─── Dark tokens ───────────────────────────────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg:           #0E0B06;
    --card:         #1C1610;
    --input-bg:     #120E08;
    --text:         #EDE4D0;
    --text-sub:     #8A6E50;
    --border:       rgba(168,135,58,0.20);
    --metric-bg:    #120E08;
    --placeholder:  rgba(138,110,80,0.40);
    --toggle-track: rgba(168,135,58,0.25);
    --shadow-sm:    0 2px 14px rgba(0,0,0,0.50);
    --shadow-md:    0 6px 32px rgba(0,0,0,0.60);

    --crust-dark:   #C4A55A;
    --basil-mid:    #52b788;

    --bar-bg:       #090603;
    --bar-text:     #EDE4D0;
    --bar-sub:      rgba(138,110,80,0.70);
    --bar-div:      rgba(168,135,58,0.15);
  }
}

/* ─── Base ──────────────────────────────────────────── */
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 45% at 12% 8%,  rgba(200,40,26,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 55% 40% at 88% 92%,  rgba(196,165,90,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.container {
  position: relative; z-index: 1;
  max-width: 660px; margin: 0 auto;
  padding: 20px 16px 110px;
}

/* ─── Header ────────────────────────────────────────── */
header { text-align: center; padding: 28px 0 22px; }

.logo {
  font-size: 52px; line-height: 1;
  display: block; margin-bottom: 10px;
  filter: drop-shadow(0 4px 12px rgba(200,40,26,0.38));
  animation: float 3.2s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50%      { transform: translateY(-7px) rotate(3deg); }
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 8vw, 3rem);
  font-weight: 900; color: var(--tomato);
  letter-spacing: -0.5px; line-height: 1;
}

header p {
  margin-top: 7px; color: var(--text-sub);
  font-size: 0.88rem; letter-spacing: 0.2px;
}

/* ─── Card ──────────────────────────────────────────── */
.card {
  background: var(--card);
  border-radius: 20px; padding: 22px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; font-weight: 700;
  color: var(--text); margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}

/* ─── Field layout ──────────────────────────────────── */
.grid-2 {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 12px;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.9px;
  color: var(--text-sub);
}
.col-2 { grid-column: 1 / -1; }

/* ─── Inputs ────────────────────────────────────────── */
.inp-wrap { position: relative; }

.inp-wrap .unit {
  position: absolute; right: 13px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.76rem; font-weight: 700;
  color: var(--crust-dark); pointer-events: none;
}

/*
  type="text" + inputmode="decimal"  → shows decimal numpad on iOS & Android
  font-size: 16px (exactly)          → prevents iOS auto-zoom on focus
*/
input[data-inp] {
  width: 100%;
  padding: 13px 46px 13px 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--input-bg);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  outline: none;
  -webkit-appearance: none; appearance: none;
  transition: border-color .2s, box-shadow .2s, transform .15s;
}

input[data-inp]:focus {
  border-color: var(--tomato);
  box-shadow: 0 0 0 3px rgba(200,40,26,0.14);
  transform: translateY(-1px);
}

input[data-inp]::placeholder { color: var(--placeholder); }

/* name has no unit badge so tighter right padding */
#pizzaName { padding-right: 14px; }

/* ─── Shape toggle ──────────────────────────────────── */
.shape-row { display: flex; gap: 8px; margin-bottom: 14px; }

.shape-btn {
  flex: 1; padding: 11px 8px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--input-bg);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem; font-weight: 600;
  color: var(--text-sub);
  transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  -webkit-tap-highlight-color: transparent;
}
.shape-btn:hover { border-color: var(--crust-dark); color: var(--text); }
.shape-btn.active {
  background: var(--tomato); border-color: var(--tomato);
  color: #fff; box-shadow: 0 4px 14px rgba(200,40,26,0.35);
}

/* ─── cm / inch toggle ──────────────────────────────── */
.unit-row {
  display: flex; align-items: center; gap: 9px;
  margin-bottom: 14px;
  font-size: 0.8rem; font-weight: 600; color: var(--text-sub);
}
.sw { position: relative; width: 44px; height: 24px; cursor: pointer; flex-shrink: 0; display: inline-block; }
.sw input { opacity: 0; width: 0; height: 0; position: absolute; }
.sw-track {
  position: absolute; inset: 0;
  background: var(--toggle-track); border-radius: 99px;
  transition: background .3s;
}
.sw-thumb {
  position: absolute; width: 18px; height: 18px;
  left: 3px; top: 3px; background: #fff;
  border-radius: 50%; transition: transform .3s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.28);
}
.sw input:checked ~ .sw-track { background: var(--tomato); }
.sw input:checked ~ .sw-thumb { transform: translateX(20px); }

/* ─── Add button ────────────────────────────────────── */
.btn-add {
  width: 100%; padding: 15px;
  background: var(--tomato); color: #fff; border: none;
  border-radius: 14px;
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 18px rgba(200,40,26,0.38);
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-add:hover  { background: var(--tomato-light); transform: translateY(-2px); box-shadow: 0 8px 26px rgba(200,40,26,0.42); }
.btn-add:active { transform: translateY(0); box-shadow: 0 2px 10px rgba(200,40,26,0.35); }

/* ─── Error ─────────────────────────────────────────── */
.err {
  color: var(--tomato); font-size: 0.8rem; font-weight: 600;
  padding: 7px 0 5px; display: none;
}

/* ─── Results header ────────────────────────────────── */
.results-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.results-hd h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem; font-weight: 700; color: var(--text);
}
.btn-clear {
  padding: 6px 14px; background: transparent;
  border: 2px solid rgba(200,40,26,0.25); border-radius: 20px;
  color: var(--tomato); font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 600; cursor: pointer;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-clear:hover { background: var(--tomato); border-color: var(--tomato); color: #fff; }

/* ─── Pizza list ────────────────────────────────────── */
.pizza-list { display: flex; flex-direction: column; gap: 12px; }

.pizza-item {
  background: var(--card);
  border-radius: 18px; padding: 18px;
  box-shadow: var(--shadow-sm);
  border: 2px solid transparent;
  position: relative; overflow: hidden;
  transition: border-color .25s, box-shadow .25s;
  animation: slideIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideIn {
  from { opacity:0; transform: translateY(18px) scale(.96); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* top accent stripe */
.pizza-item::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--stripe, transparent);
  border-radius: 18px 18px 0 0;
}
.pizza-item.is-best  { --stripe: #1e6641; border-color: rgba(30,102,65,0.28); }
.pizza-item.is-worst { --stripe: #C8281A; border-color: rgba(200,40,26,0.20); }

/* badge */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px;
  font-size: 0.68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 10px;
}
.badge.best  { background: rgba(30,102,65,0.13); color: var(--basil-mid); }
.badge.worst { background: rgba(200,40,26,0.10); color: var(--tomato); }
.badge.rank  { background: rgba(168,135,58,0.15); color: var(--crust-dark); }

/* main row */
.item-main { display: flex; align-items: center; gap: 14px; }
.item-info { flex: 1; min-width: 0; }
.item-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.02rem; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.item-dims { font-size: 0.77rem; color: var(--text-sub); }

/* metrics */
.metrics {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 8px; margin-top: 12px;
}
.metric {
  background: var(--metric-bg); border-radius: 10px;
  padding: 9px 4px; text-align: center;
}
.metric-val {
  display: block; font-size: 0.88rem; font-weight: 700; color: var(--text);
  line-height: 1.15;
}
.metric-lbl {
  display: block; font-size: 0.61rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-sub); margin-top: 2px;
}
.metric.hi .metric-val { color: #1e6641; }
@media (prefers-color-scheme: dark) {
  .metric.hi .metric-val { color: var(--basil-mid); }
}

/* value bar */
.vbar-wrap { margin-top: 12px; }
.vbar-head {
  display: flex; justify-content: space-between;
  font-size: 0.7rem; font-weight: 600; color: var(--text-sub);
  margin-bottom: 5px;
}
.vbar-track {
  height: 6px; background: var(--border);
  border-radius: 6px; overflow: hidden;
}
.vbar-fill {
  height: 100%; border-radius: 6px;
  transition: width .55s cubic-bezier(.34,1.56,.64,1);
}

/* delete button */
.btn-del {
  position: absolute; top: 14px; right: 14px;
  width: 28px; height: 28px;
  background: rgba(200,40,26,0.09); border: none; border-radius: 8px;
  color: var(--tomato); cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-del:hover { background: var(--tomato); color: #fff; transform: scale(1.12); }

/* ─── Empty state ────────────────────────────────────── */
.empty { text-align: center; padding: 40px 20px; color: var(--text-sub); }
.empty .ei { font-size: 3.5rem; display: block; margin-bottom: 12px; opacity: 0.28; }
.empty p { font-size: 0.9rem; opacity: .72; line-height: 1.65; }

/* ─── Summary bar ───────────────────────────────────── */
.sum-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bar-bg); color: var(--bar-text);
  padding: 14px 24px;
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  display: none; justify-content: space-around; align-items: center;
  z-index: 100;
  border-top: 3px solid var(--tomato);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.42);
}
.sum-bar.on { display: flex; }
.sum-item { text-align: center; }
.sum-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem; font-weight: 700; color: var(--crust); display: block;
}
.sum-lbl {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.9px; color: var(--bar-sub); font-weight: 600;
}
.sum-div { width: 1px; height: 30px; background: var(--bar-div); }

/* ─── Responsive ─────────────────────────────────────── */
@media (max-width: 380px) {
  .grid-2  { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .metrics .metric:last-child { grid-column: 1 / -1; }
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <span class="logo">🍕</span>
    <h1>Pizza Value</h1>
    <p>Find out which pizza gives you the most for your money</p>
  </header>

  <!-- Add Pizza card -->
  <div class="card">
    <div class="card-title">➕ Add a Pizza</div>

    <!-- Name: text keyboard, autocapitalize words -->
    <div class="grid-2" style="margin-bottom:14px">
      <div class="field col-2">
        <label>Pizza Name (optional)</label>
        <div class="inp-wrap">
          <input data-inp id="pizzaName"
                 type="text" inputmode="text"
                 autocomplete="off" autocorrect="off"
                 autocapitalize="words" spellcheck="false"
                 placeholder="e.g. Margherita Large">
        </div>
      </div>
    </div>

    <!-- Shape toggle -->
    <div class="field" style="margin-bottom:8px"><label>Shape</label></div>
    <div class="shape-row">
      <button class="shape-btn active" data-shape="round" onclick="setShape('round')">⭕ Round</button>
      <button class="shape-btn"        data-shape="rect"  onclick="setShape('rect')">▭ Rectangular</button>
    </div>

    <!--
      type="text" + inputmode="decimal"
      → iOS shows numeric keypad with decimal point (no letters)
      → Android shows decimal numpad
      → font-size:16px on the input prevents iOS zoom
    -->

    <!-- Round: diameter -->
    <div id="roundFields" class="grid-2">
      <div class="field col-2">
        <label>Diameter</label>
        <div class="inp-wrap">
          <input data-inp id="diameter"
                 type="text" inputmode="decimal"
                 autocomplete="off" placeholder="30">
          <span class="unit" id="uDiam">cm</span>
        </div>
      </div>
    </div>

    <!-- Rect: width + height -->
    <div id="rectFields" class="grid-2" style="display:none">
      <div class="field">
        <label>Width</label>
        <div class="inp-wrap">
          <input data-inp id="rectW"
                 type="text" inputmode="decimal"
                 autocomplete="off" placeholder="40">
          <span class="unit" id="uW">cm</span>
        </div>
      </div>
      <div class="field">
        <label>Height</label>
        <div class="inp-wrap">
          <input data-inp id="rectH"
                 type="text" inputmode="decimal"
                 autocomplete="off" placeholder="30">
          <span class="unit" id="uH">cm</span>
        </div>
      </div>
    </div>

    <!-- Price -->
    <div class="grid-2" style="margin-top:4px">
      <div class="field col-2">
        <label>Price</label>
        <div class="inp-wrap">
          <input data-inp id="price"
                 type="text" inputmode="decimal"
                 autocomplete="off" placeholder="9.99">
          <span class="unit">€</span>
        </div>
      </div>
    </div>

    <!-- cm / in toggle -->
    <div class="unit-row">
      <span>cm</span>
      <label class="sw">
        <input type="checkbox" id="unitToggle" onchange="toggleUnit()">
        <span class="sw-track"></span>
        <span class="sw-thumb"></span>
      </label>
      <span>inches</span>
    </div>

    <p class="err" id="errMsg">⚠️ Please fill in the size and price.</p>

    <button class="btn-add" onclick="addPizza()">
      <span>🍕</span> Add to Comparison
    </button>
  </div>

  <!-- Rankings -->
  <div class="results-hd">
    <h2>🏆 Rankings</h2>
    <button class="btn-clear" onclick="clearAll()">Clear All</button>
  </div>
  <div class="pizza-list" id="pizzaList">
    <div class="empty">
      <span class="ei">🍕</span>
      <p>Add your first pizza above<br>to start comparing values!</p>
    </div>
  </div>
</div>

<!-- Fixed bottom summary -->
<div class="sum-bar" id="sumBar">
  <div class="sum-item">
    <span class="sum-val" id="sCount">0</span>
    <span class="sum-lbl">Pizzas</span>
  </div>
  <div class="sum-div"></div>
  <div class="sum-item">
    <span class="sum-val" id="sBest">–</span>
    <span class="sum-lbl">Best Value</span>
  </div>
  <div class="sum-div"></div>
  <div class="sum-item">
    <span class="sum-val" id="sPPCM">–</span>
    <span class="sum-lbl" id="sPPCMLabel">€/cm²</span>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────
let pizzas = [];
let shape  = 'round';
let inches = false;
let uid    = 0;

// ── Helpers ─────────────────────────────────────────────
const $   = id => document.getElementById(id);
const num = s  => parseFloat((s || '').replace(',', '.'));

function calcArea(p) {
  return p.shape === 'round'
    ? Math.PI * (p.d / 2) ** 2
    : p.w * p.h;
}

// Price per 100 unit²
function fmtPPCM(v, unit) {
  const per100 = v * 100;
  return `${per100.toFixed(3)} €/100${unit}²`;
}

// Short version for summary bar
function fmtPPCMShort(v, unit) {
  return (v * 100).toFixed(3);
}

function barCol(ratio) {
  if (ratio >= 0.80) return '#1e6641';
  if (ratio >= 0.55) return '#52b788';
  if (ratio >= 0.35) return '#c4a55a';
  if (ratio >= 0.20) return '#d4804a';
  return '#C8281A';
}

// ── Shape & unit controls ───────────────────────────────
function setShape(s) {
  shape = s;
  document.querySelectorAll('.shape-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.shape === s));
  $('roundFields').style.display = s === 'round' ? 'grid' : 'none';
  $('rectFields').style.display  = s === 'rect'  ? 'grid' : 'none';
}

function toggleUnit() {
  inches = $('unitToggle').checked;
  const u = inches ? 'in' : 'cm';
  ['uDiam','uW','uH'].forEach(id => { const el=$(id); if(el) el.textContent=u; });
  $('sPPCMLabel').textContent = `€/100${u}²`;
  renderList();
}

// ── Add pizza ───────────────────────────────────────────
function addPizza() {
  const name  = $('pizzaName').value.trim();
  const price = num($('price').value);
  const unit  = inches ? 'in' : 'cm';

  let p = { id: ++uid, name, price, shape, unit };

  if (shape === 'round') {
    const d = num($('diameter').value);
    if (!d || !price || d <= 0 || price <= 0) { showErr(); return; }
    p.d = d;
  } else {
    const w = num($('rectW').value), h = num($('rectH').value);
    if (!w || !h || !price || w <= 0 || h <= 0 || price <= 0) { showErr(); return; }
    p.w = w; p.h = h;
  }

  $('errMsg').style.display = 'none';
  p.area  = calcArea(p);
  p.ppcm  = p.price / p.area;   // € per cm² (or in²)
  p.label = name || (shape === 'round'
    ? `Round ⌀${p.d} ${unit}`
    : `Rect ${p.w}×${p.h} ${unit}`);

  pizzas.push(p);
  clearForm();
  renderList();
}

function showErr() { $('errMsg').style.display = 'block'; }

function clearForm() {
  ['pizzaName','diameter','price','rectW','rectH'].forEach(id => {
    const el=$(id); if(el) el.value='';
  });
  $('errMsg').style.display = 'none';
}

function delPizza(id) { pizzas = pizzas.filter(p => p.id !== id); renderList(); }
function clearAll()   { pizzas = []; renderList(); }

// ── Render ──────────────────────────────────────────────
function renderList() {
  const list = $('pizzaList');
  const bar  = $('sumBar');

  if (!pizzas.length) {
    list.innerHTML = `<div class="empty"><span class="ei">🍕</span><p>Add your first pizza above<br>to start comparing values!</p></div>`;
    bar.classList.remove('on');
    return;
  }

  const sorted = [...pizzas].sort((a, b) => a.ppcm - b.ppcm);
  const best   = sorted[0];
  const worst  = sorted[sorted.length - 1];
  const range  = worst.ppcm - best.ppcm || 1;

  list.innerHTML = '';

  sorted.forEach((p, i) => {
    const isBest  = p.id === best.id;
    const isWorst = p.id === worst.id && sorted.length > 1;
    const ratio   = 1 - (p.ppcm - best.ppcm) / range;
    const pct     = Math.round(ratio * 100);
    const color   = barCol(ratio);
    const u       = p.unit;

    const viz = pizzaViz(p, sorted);

    const badge = isBest  ? `<div class="badge best">✅ Best Value</div>`
                : isWorst ? `<div class="badge worst">📉 Least Value</div>`
                          : `<div class="badge rank">#${i + 1}</div>`;

    const pricierNote = isBest ? '' :
      ` · ${(((p.ppcm - best.ppcm) / p.ppcm) * 100).toFixed(0)}% pricier/area`;

    const el = document.createElement('div');
    el.className = `pizza-item${isBest?' is-best':''}${isWorst?' is-worst':''}`;
    el.innerHTML = `
      <button class="btn-del" onclick="delPizza(${p.id})" aria-label="Remove">✕</button>
      ${badge}
      <div class="item-main">
        <div class="pizza-viz">${viz}</div>
        <div class="item-info">
          <div class="item-name">${p.label}</div>
          <div class="item-dims">${dimStr(p)}</div>
        </div>
      </div>
      <div class="metrics">
        <div class="metric">
          <span class="metric-val">€${p.price.toFixed(2)}</span>
          <span class="metric-lbl">Price</span>
        </div>
        <div class="metric">
          <span class="metric-val">${p.area.toFixed(1)} ${u}²</span>
          <span class="metric-lbl">Area</span>
        </div>
        <div class="metric${isBest?' hi':''}">
          <span class="metric-val">${fmtPPCM(p.ppcm, u)}</span>
          <span class="metric-lbl">per 100${u}²</span>
        </div>
      </div>
      <div class="vbar-wrap">
        <div class="vbar-head">
          <span>Value Score</span>
          <span>${pct}%${pricierNote}</span>
        </div>
        <div class="vbar-track">
          <div class="vbar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>
    `;
    list.appendChild(el);
  });

  // Summary bar
  bar.classList.add('on');
  $('sCount').textContent = pizzas.length;
  $('sBest').textContent  = best.label.length > 13 ? best.label.slice(0,12)+'…' : best.label;
  $('sPPCM').textContent  = fmtPPCMShort(best.ppcm, best.unit);
  $('sPPCMLabel').textContent = `€/100${best.unit}²`;
}

function dimStr(p) {
  return p.shape === 'round'
    ? `Round · ⌀${p.d} ${p.unit}`
    : `Rect · ${p.w} × ${p.h} ${p.unit}`;
}

// ── SVG pizza visualization ─────────────────────────────
function pizzaViz(p, sorted) {
  const maxArea = sorted.reduce((m, x) => Math.max(m, x.area), 0);
  const scale   = Math.sqrt(p.area / maxArea);
  const MAX     = 54;

  if (p.shape === 'round') {
    const r = Math.max(16, Math.round(MAX / 2 * scale));
    const s = r * 2;
    return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" style="flex-shrink:0">
      <defs>
        <radialGradient id="rg${p.id}" cx="42%" cy="36%" r="62%">
          <stop offset="0%"   stop-color="#f8dc90"/>
          <stop offset="55%"  stop-color="#e8b848"/>
          <stop offset="100%" stop-color="#c48024"/>
        </radialGradient>
      </defs>
      <circle cx="${r}" cy="${r}" r="${r}" fill="url(#rg${p.id})"/>
      <circle cx="${r*.52}" cy="${r*.60}" r="${r*.22}" fill="#C8281A" opacity=".72"/>
      <circle cx="${r*1.32}" cy="${r*.82}" r="${r*.17}" fill="#C8281A" opacity=".65"/>
      <circle cx="${r*.78}" cy="${r*1.36}" r="${r*.19}" fill="#C8281A" opacity=".68"/>
      <circle cx="${r}" cy="${r}" r="${r-.5}" fill="none" stroke="#c48024" stroke-width="${Math.max(2,r*.11)}"/>
    </svg>`;
  } else {
    const ratio = p.w / p.h;
    let W, H;
    if (ratio >= 1) { W = MAX; H = Math.max(14, Math.round(MAX / ratio)); }
    else            { H = MAX; W = Math.max(14, Math.round(MAX * ratio)); }
    W = Math.max(14, Math.round(W * scale));
    H = Math.max(10, Math.round(H * scale));
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="flex-shrink:0">
      <defs>
        <linearGradient id="lg${p.id}" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#f8dc90"/>
          <stop offset="100%" stop-color="#d4a040"/>
        </linearGradient>
      </defs>
      <rect width="${W}" height="${H}" rx="3" fill="url(#lg${p.id})"/>
      <rect x="${W*.1}" y="${H*.12}" width="${W*.8}" height="${H*.76}" rx="2" fill="#C8281A" opacity=".52"/>
      <rect width="${W}" height="${H}" rx="3" fill="none" stroke="#c48024" stroke-width="${Math.max(2,Math.min(W,H)*.08)}"/>
    </svg>`;
  }
}

// 1. App icon via canvas
function makeIconDataURL(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const r = size / 2;

  // Red background
  ctx.beginPath();
  ctx.arc(r, r, r, 0, Math.PI * 2);
  ctx.fillStyle = '#C8281A';
  ctx.fill();

  // Crust / dough
  ctx.beginPath();
  ctx.arc(r, r, r * 0.80, 0, Math.PI * 2);
  ctx.fillStyle = '#e8b848';
  ctx.fill();

  // Sauce blobs
  ctx.fillStyle = '#C8281A';
  ctx.globalAlpha = 0.82;
  [[0.65, 0.70, 0.22],[1.30, 0.86, 0.17],[0.88, 1.32, 0.19]].forEach(([cx,cy,rad]) => {
    ctx.beginPath();
    ctx.arc(r*cx, r*cy, r*rad, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Crust ring
  ctx.beginPath();
  ctx.arc(r, r, r * 0.80, 0, Math.PI * 2);
  ctx.strokeStyle = '#c48024';
  ctx.lineWidth = r * 0.10;
  ctx.stroke();

  // Emoji overlay
  ctx.font = `bold ${size * 0.46}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillText('🍕', r, r);

  return canvas.toDataURL('image/png');
}

const icon512 = makeIconDataURL(512);

// 4. Inline service worker via Blob
const swCode = `
const CACHE = 'pizza-value-v1';
self.addEventListener('install', () => self.skipWaiting());
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.open(CACHE).then(cache =>
      cache.match(e.request).then(hit =>
        hit || fetch(e.request).then(res => {
          cache.put(e.request, res.clone());
          return res;
        })
      )
    )
  );
});
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob))
    .catch(() => {});
}

  e.preventDefault();
  deferredPrompt = e;

});

document.getElementById('pwa-install').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.style.display = 'none';
});

document.getElementById('pwa-dismiss').addEventListener('click', () => {
  banner.style.display = 'none';
});

window.addEventListener('appinstalled', () => {

});
