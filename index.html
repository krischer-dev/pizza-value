<body>
<div class=container>
<header>
<span class=logo>🍕</span>
<h1>Pizza Value</h1>
<p>Find out which pizza gives you the most for your money</p>
</header>
<div class=card>
<div class=card-title>➕ Add a Pizza</div>
<div class=grid-2 style=margin-bottom:14px>
<div class="field col-2">
<label>Pizza Name (optional)</label>
<div class=inp-wrap>
<input data-inp id=pizzaName inputmode=text autocomplete=off autocorrect=off autocapitalize=words spellcheck=false placeholder="e.g. Margherita Large">
</div>
</div>
</div>
<div class=field style=margin-bottom:8px><label>Shape</label></div>
<div class=shape-row>
<button class="shape-btn active" data-shape=round onclick='setShape("round")'>⭕ Round</button>
<button class=shape-btn data-shape=rect onclick='setShape("rect")'>▭ Rectangular</button>
</div>
<div id=roundFields class=grid-2>
<div class="field col-2">
<label>Diameter</label>
<div class=inp-wrap>
<input data-inp id=diameter inputmode=decimal autocomplete=off placeholder=30>
<span class=unit id=uDiam>cm</span>
</div>
</div>
</div>
<div id=rectFields class=grid-2 style=display:none>
<div class=field>
<label>Width</label>
<div class=inp-wrap>
<input data-inp id=rectW inputmode=decimal autocomplete=off placeholder=40>
<span class=unit id=uW>cm</span>
</div>
</div>
<div class=field>
<label>Height</label>
<div class=inp-wrap>
<input data-inp id=rectH inputmode=decimal autocomplete=off placeholder=30>
<span class=unit id=uH>cm</span>
</div>
</div>
</div>
<div class=grid-2 style=margin-top:4px>
<div class="field col-2">
<label>Price</label>
<div class=inp-wrap>
<input data-inp id=price inputmode=decimal autocomplete=off placeholder=9.99>
<span class=unit>€</span>
</div>
</div>
</div>
<div class=unit-row>
<span>cm</span>
<label class=sw>
<input type=checkbox id=unitToggle onchange=toggleUnit()>
<span class=sw-track></span>
<span class=sw-thumb></span>
</label>
<span>inches</span>
</div>
<p class=err id=errMsg>⚠️ Please fill in the size and price.</p>
<button class=btn-add onclick=addPizza()>
<span>🍕</span> Add to Comparison
</button>
</div>
<div class=results-hd>
<h2>🏆 Rankings</h2>
<button class=btn-clear onclick=clearAll()>Clear All</button>
</div>
<div class=pizza-list id=pizzaList>
<div class=empty>
<span class=ei>🍕</span>
<p>Add your first pizza above<br>to start comparing values!</p>
</div>
</div>
</div>
<div class=sum-bar id=sumBar>
<div class=sum-item>
<span class=sum-val id=sCount>0</span>
<span class=sum-lbl>Pizzas</span>
</div>
<div class=sum-div></div>
<div class=sum-item>
<span class=sum-val id=sBest>–</span>
<span class=sum-lbl>Best Value</span>
</div>
<div class=sum-div></div>
<div class=sum-item>
<span class=sum-val id=sPPCM>–</span>
<span class=sum-lbl id=sPPCMLabel>€/cm²</span>
</div>
</div>
